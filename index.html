<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column; /* 세로 정렬 */
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            font-family: 'Pretendard', -apple-system, sans-serif;
            cursor: pointer; /* 마우스 커서를 손가락 모양으로 변경 */
            user-select: none; /* 글자 선택 방지 */
        }

        h1 {
            font-size: 2.5rem;
            color: #212529;
            transition: transform 0.2s;
        }

        p {
            color: #6c757d;
            margin-top: 10px;
        }

        /* 클릭 시 살짝 작아지는 효과 */
        body:active h1 {
            transform: scale(0.95);
        }
    </style>
</head>
<body onclick="location.href='/api/test'">
    <h1>환영합니다!</h1>
    <p>화면을 클릭하면 API 데이터를 확인합니다.</p>
</body>
</html>
